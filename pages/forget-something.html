<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歸心物流 - 忘了什麼嗎？</title>
    <link rel="icon" href="../image/GUIXIN.webp" type="image/webp">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            overflow: hidden;
            font-family: "Noto Sans TC", sans-serif;
        }

        /* 1. 把拔最愛的毛玻璃導航欄回歸！ */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.05); /* 輕微白色基調 */
            backdrop-filter: blur(15px) brightness(0.6); /* 強力毛玻璃 */
            -webkit-backdrop-filter: blur(15px) brightness(0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 1000; /* 層級拉高 */
            pointer-events: none; 
        }

        .header-bar a {
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 1rem; letter-spacing: 0.3em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .scene-wrapper {
            flex: 1;
            display: flex; justify-content: center; align-items: center;
            position: relative; width: 100%; height: 100%;
        }

        .scene-container {
            position: relative;
            width: 100vw; height: 56.25vw;
            max-height: 100vh; max-width: 177.78vh;
            /* 💡 核心修正：取消溢出隱藏，讓發光可以「溢出」格子而不被切斷 */
            overflow: visible !important;
        }

        .scene-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 2. 互動點優化：解決切邊的終極武器 */
        .hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 50%;
            opacity: 0;
            /* 💡 修正：確保 radial-gradient 的邊緣在盒子內完美消失 */
            background: radial-gradient(circle at center, rgba(0, 255, 120, 0.6) 0%, transparent 80%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: blur(10px);
            transform: translate(-50%, -50%);
            z-index: 500;
            opacity: 0.1; /* 平常就有極淡的影子 */
    animation: pulse 3s infinite ease-in-out;
        }

        .hotspot:hover {
            opacity: 1;
            animation: none;
            filter: blur(4px) brightness(1.2);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* --- 座標修正：稍微加大 turtle-shell 的寬高容器，防止切邊 --- */
        #turtle-shell { width: 18%; height: 22%; left: 11.5%; top: 69%; }
        #newspaper    { width: 15%; height: 20%; left: 10%; top: 86%; }
        #crt-monitor  { width: 10%; height: 14%; left: 24%; top: 77.5%; }
        #lcd-monitor  { width: 12%; height: 18%; left: 84.5%; top: 61.5%; }
        #phone-screen { width: 6%;  height: 12%; left: 92.5%; top: 66%; }

        .hint-text {
            position: fixed; bottom: 5%; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5em; font-size: 0.8rem;
            z-index: 5; pointer-events: none;
            animation: breathe 4s infinite;
        }

        @keyframes pulse {
    0%, 100% { 
        opacity: 0.05; 
        transform: translate(-50%, -50%) scale(1); 
    }
    50% { 
        opacity: 0.2; /* 讓它稍微亮一點點，提示玩家 */
        transform: translate(-50%, -50%) scale(1.1); 
    }
}

        @keyframes breathe {
            0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <nav class="header-bar">
        <a href="forget-something.html" class="logo-text">歸心物流 | 失物招領處</a>
        <a href="../index.html" class="logo-text" style="font-size: 0.7rem; opacity: 0.5;">回 到 首 頁</a>
    </nav>

    <div class="scene-wrapper">
        <div class="scene-container">
            <img src="../image/forget-something.webp" class="scene-img" alt="Warehouse">
            <div class="hotspot" id="turtle-shell" onclick="alert('烏...烏龜的殼??')"></div>
            <div class="hotspot" id="newspaper" onclick="alert('這些報紙似乎來自不同的時空。')"></div>
            <div class="hotspot" id="crt-monitor" onclick="alert('這裡怎麼有台這麼舊的電腦??')"></div>
            <div class="hotspot" id="lcd-monitor" onclick="alert('監視器畫面上只有一片雜訊。')"></div>
            <div class="hotspot" id="phone-screen" onclick="triggerGlitch()"></div>
        </div>
    </div>

    <div class="hint-text">FORGET SOMETHING?</div>

    <script>
        function triggerGlitch() {
            alert('訊息顯示：妳以為妳逃掉了嗎？');
        }
    </script>
</body>
</html>
